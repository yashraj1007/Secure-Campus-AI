<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Secure Campus AI</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .error-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    .error-code { font-size: 6rem; font-weight: 800; font-family: var(--font-mono); color: var(--accent-blue); line-height: 1; margin-bottom: 1rem; }
    .error-title { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .error-desc { color: var(--text-secondary); margin-bottom: 2rem; max-width: 400px; }
  </style>
</head>
<body>
  <div class="error-page">
    <div>
      <div class="error-code">404</div>
      <h1 class="error-title">Threat Not Found</h1>
      <p class="error-desc">The page you're looking for doesn't exist or has been moved.</p>
      <a href="index.html" class="btn btn-primary">Return to Home</a>
    </div>
  </div>
</body>
</html>
