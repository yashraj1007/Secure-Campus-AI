<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Scholarship & Internship Scam Checker</title>

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/student.css">

</head>

<body
data-app="student"
data-title="Scholarship & Internship Scam Checker"
data-breadcrumb="Student Portal / Opportunity Checker"
data-status="Protected">

<div data-page-content>

<div class="page-header">

<h1>🎓 Scholarship & Internship Scam Checker</h1>

<p>
Verify whether an internship or scholarship opportunity is genuine before applying.
</p>

</div>

<div class="panel">

<div class="panel__body">

<label>Paste Opportunity Details</label>

<textarea
id="opportunity-text"
rows="12"
class="input"
placeholder="Paste internship email, scholarship message, WhatsApp message or offer letter here..."></textarea>

<br><br>

<button
id="check-btn"
class="btn btn-primary">

Analyze Opportunity

</button>

</div>

</div>

<br>

<div class="panel">

<div class="panel__header">

<h3>Analysis Result</h3>

</div>

<div
id="opportunity-result"
class="panel__body">

No analysis yet.

</div>

</div>

</div>

<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/opportunity-checker.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const session = Auth.requireAuth("student");

    if(session){
        Auth.populateUserInfo(session);
    }

    lucide.createIcons();

});
</script>

</body>
</html>
